# This workflow will build a .NET project with secret management
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Build and Test

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Configure secrets in appsettings
      run: |
        cat > ShopEgypt/appsettings.Secrets.json << 'EOF'
        {
          "ConnectionStrings": {
            "DefaultConnection": "${{ secrets.DATABASE_CONNECTION_STRING }}"
          },
          "CloudinarySettings": {
            "CloudName": "${{ secrets.CLOUDINARY_CLOUDNAME }}",
            "ApiKey": "${{ secrets.CLOUDINARY_APIKEY }}",
            "ApiSecret": "${{ secrets.CLOUDINARY_APISECRET }}"
          },
          "SendGrid": {
            "ApiKey": "${{ secrets.SENDGRID_APIKEY }}",
            "FromEmail": "${{ secrets.SENDGRID_FROMEMAIL }}",
            "FromName": "${{ secrets.SENDGRID_FROMNAME }}"
          },
          "Authentication": {
            "Google": {
              "ClientId": "${{ secrets.GOOGLE_CLIENTID }}",
              "ClientSecret": "${{ secrets.GOOGLE_CLIENTSECRET }}"
            },
            "Facebook": {
              "AppId": "${{ secrets.FACEBOOK_APPID }}",
              "AppSecret": "${{ secrets.FACEBOOK_APPSECRET }}"
            }
          }
        }
        EOF
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build solution
      run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore
      env:
        DATABASE_CONNECTION_STRING: ${{ secrets.DATABASE_CONNECTION_STRING }}
        CLOUDINARY_CLOUDNAME: ${{ secrets.CLOUDINARY_CLOUDNAME }}
        CLOUDINARY_APIKEY: ${{ secrets.CLOUDINARY_APIKEY }}
        CLOUDINARY_APISECRET: ${{ secrets.CLOUDINARY_APISECRET }}
        SENDGRID_APIKEY: ${{ secrets.SENDGRID_APIKEY }}
        SENDGRID_FROMEMAIL: ${{ secrets.SENDGRID_FROMEMAIL }}
        SENDGRID_FROMNAME: ${{ secrets.SENDGRID_FROMNAME }}
        GOOGLE_CLIENTID: ${{ secrets.GOOGLE_CLIENTID }}
        GOOGLE_CLIENTSECRET: ${{ secrets.GOOGLE_CLIENTSECRET }}
        FACEBOOK_APPID: ${{ secrets.FACEBOOK_APPID }}
        FACEBOOK_APPSECRET: ${{ secrets.FACEBOOK_APPSECRET }}
    
    - name: Run tests
      run: dotnet test --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"
      env:
        DATABASE_CONNECTION_STRING: ${{ secrets.DATABASE_CONNECTION_STRING }}
        CLOUDINARY_CLOUDNAME: ${{ secrets.CLOUDINARY_CLOUDNAME }}
        CLOUDINARY_APIKEY: ${{ secrets.CLOUDINARY_APIKEY }}
        CLOUDINARY_APISECRET: ${{ secrets.CLOUDINARY_APISECRET }}
        SENDGRID_APIKEY: ${{ secrets.SENDGRID_APIKEY }}
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/test-results.trx'
    
    - name: Publish build artifacts
      if: success()
      run: dotnet publish ShopEgypt/ShopEgypt.csproj --configuration ${{ env.CONFIGURATION }} --output ./publish
      env:
        DATABASE_CONNECTION_STRING: ${{ secrets.DATABASE_CONNECTION_STRING }}
        CLOUDINARY_CLOUDNAME: ${{ secrets.CLOUDINARY_CLOUDNAME }}
        CLOUDINARY_APIKEY: ${{ secrets.CLOUDINARY_APIKEY }}
        CLOUDINARY_APISECRET: ${{ secrets.CLOUDINARY_APISECRET }}
        SENDGRID_APIKEY: ${{ secrets.SENDGRID_APIKEY }}
    
    - name: Upload publish artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: publish-artifacts
        path: ./publish
